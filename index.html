<script>

  const q=document.getElementById('qInput');let t;
  q.addEventListener('input',()=>{document.getElementById('btnX').classList.toggle('on',q.value.length>0);clearTimeout(t);t=setTimeout(doSearch,220);});
  q.addEventListener('keydown',e=>{if(e.key==='Enter'){q.blur();doSearch()}});
  const m=document.getElementById('mInput');let mt;
  m.addEventListener('input',()=>{clearTimeout(mt);mt=setTimeout(()=>hlMap(m.value.trim()),280);});
  m.addEventListener('keydown',e=>{if(e.key==='Enter'){m.blur();hlMap(m.value.trim())}});
  await loadData();
});
function setLoader(txt,pct){document.getElementById('ldrTxt').textContent=txt;document.getElementById('ldrFill').style.width=pct+'%';}
async function loadData(){
  try{
    setLoader('Buscando arquivos no GitHub...',10);
    const res=await fetch(`https://api.github.com/repos/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/contents/${CONFIG.DADOS_PASTA}`);
    if(!res.ok)throw new Error(`GitHub API: ${res.status} — verifique GITHUB_USER e GITHUB_REPO no CONFIG`);
    const files=await res.json();
    const jsonFiles=files.filter(f=>f.name.toLowerCase().endsWith('.json'));
    if(!jsonFiles.length)throw new Error('Nenhum .json encontrado em dados/ — use a página /processar.html para converter seu Excel');
    setLoader(`${jsonFiles.length} arquivo(s) encontrado(s)...`,20);
    let cache={};try{cache=JSON.parse(localStorage.getItem(CONFIG.CACHE_KEY)||'{}');}catch{}
    const allRecords={};const lotesInfo=[];
    for(let i=0;i<jsonFiles.length;i++){
      const file=jsonFiles[i];const pct=20+Math.round((i/jsonFiles.length)*70);
      setLoader(`Carregando ${file.name}...`,pct);
      let records;
      if(cache[file.sha]){records=cache[file.sha];lotesInfo.push({nome:file.name,sha:file.sha,registros:records.length,status:'cache'});}
      else{
        try{
          const dlRes=await fetch(file.download_url);records=await dlRes.json();
          cache[file.sha]=records;
          lotesInfo.push({nome:file.name,sha:file.sha,registros:records.length,status:'novo'});
        }catch(e){lotesInfo.push({nome:file.name,sha:file.sha,registros:0,status:'erro',erro:e.message});continue;}
      }
      records.forEach(r=>{allRecords[r.codigoTdc]=r;});
    }
    try{localStorage.setItem(CONFIG.CACHE_KEY,JSON.stringify(cache));}catch{}
    DATA=Object.values(allRecords);lotes=lotesInfo;
    setLoader('Pronto!',100);
    document.getElementById('hdrCount').textContent=DATA.length+' reg.';
    setTimeout(()=>{const l=document.getElementById('ldr');l.style.cssText+='transition:opacity .4s;opacity:0';setTimeout(()=>l.remove(),400);},300);
  }catch(err){
    setLoader('Erro: '+err.message,100);document.getElementById('ldrTxt').style.color='var(--red)';
    setTimeout(()=>{document.getElementById('ldr').remove();document.getElementById('resList').innerHTML=`<div class="empty"><div class="ei">⚠️</div><div class="et">Erro ao carregar</div><div class="es">${err.message}</div></div>`;},2000);
  }
}

function showStatus(){
  document.getElementById('statusSummary').innerHTML=`<div><div class="sumVal">${DATA.length}</div><div class="sumLbl">Registros</div></div><div><div class="sumVal">${DATA.filter(r=>r.lat).length}</div><div class="sumLbl">Com GPS</div></div><div><div class="sumVal">${lotes.length}</div><div class="sumLbl">Lotes</div></div>`;
  document.getElementById('lotesList').innerHTML=lotes.map(l=>`<div class="loteItem"><div class="loteIcon" style="background:${l.status==='erro'?'rgba(248,113,113,.1)':'rgba(34,197,94,.1)'}">${l.status==='erro'?'❌':l.status==='novo'?'🆕':'✅'}</div><div class="loteInfo"><div class="loteNome">${l.nome}</div><div class="loteMeta">${l.registros} registros${l.status==='erro'?' · '+l.erro:''}</div></div><span class="loteBadge ${l.status==='erro'?'lbErr':l.status==='novo'?'lbLoad':'lbOk'}">${l.status==='erro'?'erro':l.status==='novo'?'novo':'cache'}</span></div>`).join('');
  document.getElementById('statusModal').classList.add('on');
}
function hideStatus(){document.getElementById('statusModal').classList.remove('on');}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('statusModal').addEventListener('click',e=>{if(e.target===document.getElementById('statusModal'))hideStatus();});});
function goTab(el){const s=el.dataset.s;if(s===curScreen)return;curScreen=s;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');posTabBar(el);document.querySelectorAll('.screen').forEach(sc=>{sc.style.display='none';sc.classList.remove('on');});const sc=document.getElementById(s);sc.style.display='flex';sc.classList.add('on');if(s==='sMapa'&&!mapReady)initMap();}
function posTabBar(el){const bar=document.getElementById('tabBar'),tabs=document.getElementById('tabs'),r=el.getBoundingClientRect(),tr=tabs.getBoundingClientRect();bar.style.left=(r.left-tr.left)+'px';bar.style.width=r.width+'px';}
function doSearch(){const q=document.getElementById('qInput').value.trim().toLowerCase();let res=filterData(DATA);if(q)res=res.filter(r=>r.codigoTdc.includes(q)||r.cliente.toLowerCase().includes(q)||r.municipio.toLowerCase().includes(q)||r.bairro.toLowerCase().includes(q)||r.enderecoCompleto.toLowerCase().includes(q)||r.codigoExterno.toLowerCase().includes(q)||r.numeroServico.toLowerCase().includes(q)||r.equipe.toLowerCase().includes(q));results=res;renderList(res,q);}
function filterData(data){if(filter==='all')return data;const[t,v]=filter.split(':');if(t==='co')return data.filter(r=>r.co===v);if(t==='estado')return data.filter(r=>r.estado===v);if(t==='gps')return data.filter(r=>r.lat&&r.lng);return data;}
function setChip(el,f){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');filter=f;doSearch();}
function clearQ(){document.getElementById('qInput').value='';document.getElementById('btnX').classList.remove('on');results=[];renderList([],'')}
function renderList(res,q){const list=document.getElementById('resList');if(!res.length){list.innerHTML=q||filter!=='all'?`<div class="empty"><div class="ei">🔎</div><div class="et">Nenhum resultado</div><div class="es">Tente outro termo</div></div>`:`<div class="empty"><div class="ei">🔦</div><div class="et">Busque um TDC</div><div class="es">Código, cliente,<br>município ou endereço</div></div>`;return;}list.innerHTML=res.map((r,i)=>`<div class="card${selTdc&&selTdc.codigoTdc===r.codigoTdc?' sel':''}" onclick="pickCard(${i})"><div class="cTop"><span class="cCode">#${r.codigoTdc}</span><span class="cBadge ${eCls(r.estado)}">${r.estado||'N/A'}</span></div><div class="cNome">${r.cliente||'—'}</div><div class="cAddr">${r.bairro?r.bairro+' · ':''}${r.municipio||'—'}</div><div class="cTags">${r.co?`<span class="tag tCo">${r.co}</span>`:''} ${r.municipio?`<span class="tag tMun">${r.municipio}</span>`:''} ${r.lat?`<span class="tag tGps">📍 GPS</span>`:''}<span class="tag tLote">${r.lote.replace('.xlsx','')}</span></div></div>`).join('');}
function eCls(e){if(!e)return'eD';const s=e.toLowerCase();if(s.includes('finalizado'))return'eF';if(s.includes('execu'))return'eX';if(s.includes('anulado'))return'eA';if(s.includes('enviado')||s.includes('campo'))return'eE';return'eD';}
function pickCard(i){const r=results[i];selTdc=r;document.querySelectorAll('.card').forEach((c,j)=>c.classList.toggle('sel',j===i));const mapTab=document.querySelector('[data-s="sMapa"]');goTab(mapTab);document.getElementById('mInput').value=r.codigoTdc;setTimeout(()=>hlMap(r.codigoTdc),mapReady?0:250);}
function initMap(){if(mapReady)return;mapReady=true;mapObj=L.map('map',{center:[-7.0,-39.3],zoom:9,zoomControl:false,attributionControl:true});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20,attribution:'© OpenStreetMap'}).addTo(mapObj);L.control.zoom({position:'bottomright'}).addTo(mapObj);const wc=DATA.filter(r=>r.lat&&r.lng);document.getElementById('mapN').textContent=wc.length;wc.forEach(r=>{const color=r.latSource==='campo'?'#22c55e':'#3b82f6';const m=L.circleMarker([r.lat,r.lng],{radius:6,fillColor:color,color:'#fff',weight:1.5,fillOpacity:.85,opacity:1}).addTo(mapObj).on('click',e=>{L.DomEvent.stopPropagation(e);hlMap(r.codigoTdc);});markers[r.codigoTdc]={marker:m,rec:r,color};});mapObj.on('click',()=>closeSheet());}
function hlMap(code){if(!code||!mapReady)return;if(!markers[code]){const k=Object.keys(markers).find(k=>k.startsWith(code));if(k)return hlMap(k);return;}if(selCode&&markers[selCode]){const p=markers[selCode];p.marker.setStyle({radius:6,fillColor:p.color,color:'#fff',weight:1.5,fillOpacity:.85});}selCode=code;const{marker,rec}=markers[code];marker.setStyle({radius:14,fillColor:'#f59e0b',color:'#fff',weight:2.5,fillOpacity:1});mapObj.flyTo([rec.lat,rec.lng],Math.max(mapObj.getZoom(),16),{duration:.9});openSheet(rec);}
function openSheet(r){const sheet=document.getElementById('sheet');sheet.classList.remove('open');buildSheet(r);requestAnimationFrame(()=>sheet.classList.add('open'));}
function closeSheet(){document.getElementById('sheet').classList.remove('open');}
function buildSheet(r){
  const mUrl=r.lat?`https://www.google.com/maps?q=${r.lat},${r.lng}`:`https://www.google.com/maps/search/${encodeURIComponent(r.enderecoCompleto||'')}`;
  const wUrl=r.lat?`https://waze.com/ul?ll=${r.lat},${r.lng}&navigate=yes`:`https://waze.com/ul?q=${encodeURIComponent(r.enderecoCompleto||'')}`;
  const nearby=r.lat?DATA.filter(x=>x.codigoTdc!==r.codigoTdc&&x.lat&&x.lng).map(x=>({...x,dist:haversine(r.lat,r.lng,x.lat,x.lng)})).filter(x=>x.dist<1000).sort((a,b)=>a.dist-b.dist).slice(0,6):[];
  const gpsHTML=r.lat?`<div class="gpsBox"><div class="gpsBoxLabel">📍 GPS Principal (usado no mapa)</div><div class="gpsCoords">${r.lat.toFixed(6)}, ${r.lng.toFixed(6)}<span class="gpsBadge">${r.latSource==='campo'?'Campo':'Cadastro'}</span></div>${buildAltSection(r)}</div>`:`<div style="font-size:12px;color:var(--muted);margin-bottom:12px">⚠ Sem coordenadas GPS</div>`;
  const atends=r.atendimentos||[];
  const atendHTML=atends.length?`<div class="atendSection"><div class="atendHeader"><div class="atendTitle">Atendimento${atends.length>1?'s':''}</div>${atends.length>1?`<div class="atendCount">${atends.length}</div>`:''}</div>${atends.map((a,i)=>buildAtendCard(a,i)).join('')}</div>`:'';
  const dicaHTML=r.dica?`<div class="dicaBox"><div class="dicaLbl">💡 Dica de localização</div><div class="dicaText">${r.dica}</div></div>`:'';
  const execHTML=r.executores&&r.executores.length?`<div class="execBox"><div class="execLbl">👷 Executou</div>${r.executores.map(e=>`<div class="execItem"><div class="execAvatar">${(e.nome||'?')[0]}</div><div><div class="execNome">${e.nome||'—'}</div><div class="execMeta">${e.matricula||''} ${e.tempo?'· '+parseFloat(e.tempo).toFixed(1)+'h':''}</div></div></div>`).join('')}</div>`:'';
  const nearHTML=nearby.length?`<div class="nearTitle">📍 ${nearby.length} TDC${nearby.length>1?'s':''} num raio de 1 km</div>${nearby.map(x=>`<div class="nearItem" onclick="hlMap('${x.codigoTdc}')"><span class="nearCode">#${x.codigoTdc}</span><div class="nearInfo"><div class="nearNome">${x.cliente||'—'}</div><div class="nearDist">${fmtDist(x.dist)} · ${x.estado||'N/A'}</div></div><span class="nearArrow">›</span></div>`).join('')}`:'';
  document.getElementById('sheetBody').innerHTML=`<div class="sTdc">#${r.codigoTdc} · <span class="cBadge ${eCls(r.estado)}" style="font-size:10px">${r.estado||'N/A'}</span></div><div class="sNome">${r.cliente||'—'}</div><div class="sAddr">${r.enderecoCompleto||(r.bairro?r.bairro+', ':'')+(r.municipio||'—')}</div>${gpsHTML}<div class="navBtns"><a class="navBtn nG" href="${mUrl}" target="_blank">🗺 Google Maps</a><a class="navBtn nW" href="${wUrl}" target="_blank">🚗 Waze</a></div>${dicaHTML}${atendHTML}<div class="infoGrid"><div class="infoBlock"><div class="infoLbl">Município</div><div class="infoVal">${r.municipio||'—'}</div></div><div class="infoBlock"><div class="infoLbl">Bairro</div><div class="infoVal">${r.bairro||'—'}</div></div><div class="infoBlock"><div class="infoLbl">Equipe</div><div class="infoVal infoMono">${r.equipe||'—'}</div></div><div class="infoBlock"><div class="infoLbl">Responsável</div><div class="infoVal" style="font-size:11px">${r.responsavel||'—'}</div></div><div class="infoBlock"><div class="infoLbl">CO</div><div class="infoVal" style="font-size:11px">${r.co||'—'}</div></div><div class="infoBlock"><div class="infoLbl">Lote</div><div class="infoVal infoMono" style="font-size:10px">${r.lote.replace('.xlsx','')}</div></div></div>${execHTML}${nearHTML}`;
  if(atends.length===1)toggleAtend(0);
}
function buildAltSection(r){const alts=r.gpsAlternativas||[];if(alts.length<=1)return'';const colorOf=t=>{if(!t)return'#94a3b8';const s=t.toLowerCase();if(s.includes('fechamento'))return'#22c55e';if(s.includes('chegada'))return'#60a5fa';if(s.includes('início'))return'#fb923c';if(s.includes('toma'))return'#a78bfa';return'#94a3b8';};return`<div class="altTitle">Outras leituras GPS — toque para navegar</div><div class="altList">${alts.map(g=>`<div class="altItem" onclick="navToGps(${g.lat},${g.lng})"><div class="altDot" style="background:${colorOf(g.tipoAtividade)}"></div><div class="altInfo"><div class="altTipo">${g.tipoAtividade||'Coordenada Cadastro'}</div><div class="altMeta">${g.data||''}${g.precisao&&g.precisao<9999?' · ±'+g.precisao.toFixed(1)+'m':''}</div></div><div class="altCoord">${g.lat.toFixed(4)},${g.lng.toFixed(4)}</div><span class="altArrow">›</span></div>`).join('')}</div>`;}
function buildAtendCard(a,i){const realizado=a.resultado==='Realizado',naoReal=a.resultado==='Não Realizado',dotColor=realizado?'#22c55e':naoReal?'#f87171':'#94a3b8';let duracao='';if(a.inicio&&a.fim){try{const parse=s=>{const[d,t]=s.split(' ');const[D,M,Y]=d.split('/');return new Date(`${Y}-${M}-${D}T${t}`);};const diff=(parse(a.fim)-parse(a.inicio))/60000;if(diff>=0)duracao=diff<60?Math.round(diff)+' min':(diff/60).toFixed(1)+' h';}catch{}}const divida=a.divida&&parseFloat(a.divida)>0?`R$ ${parseFloat(a.divida).toLocaleString('pt-BR',{minimumFractionDigits:2})}`:'';const gpsMedHTML=a.gpsMedidor?`<div class="atendGpsMed" onclick="navToGps(${a.gpsMedidor.lat},${a.gpsMedidor.lng})"><span style="font-size:16px">📍</span><div class="atendGpsMedLabel">GPS do Medidor</div><div class="atendGpsMedCoord">${a.gpsMedidor.lat.toFixed(5)}, ${a.gpsMedidor.lng.toFixed(5)}</div><span style="color:var(--muted)">›</span></div>`:'';return`<div class="atendCard"><div class="atendCardHead" onclick="toggleAtend(${i})"><div class="atendResultDot" style="background:${dotColor}"></div><div class="atendHeadInfo"><div class="atendTipoOp">${a.tipoOperacao||'Operação'}</div><div class="atendCausa">${a.causa||a.resultado||'—'}</div></div><span class="atendChevron" id="chev-${i}">›</span></div><div class="atendBody" id="abody-${i}"><div class="atendGrid"><div class="atendField"><div class="atendLbl">Resultado</div><div class="atendVal" style="color:${dotColor}">${a.resultado||'—'}</div></div><div class="atendField"><div class="atendLbl">Chegada</div><div class="atendVal" style="font-size:11px">${a.chegada||'—'}</div></div><div class="atendField"><div class="atendLbl">Início</div><div class="atendVal" style="font-size:11px">${a.inicio||'—'}</div></div><div class="atendField"><div class="atendLbl">Fim ${duracao?'· '+duracao:''}</div><div class="atendVal" style="font-size:11px">${a.fim||'—'}</div></div>${a.ajudante?`<div class="atendField"><div class="atendLbl">Ajudante</div><div class="atendVal" style="font-size:11px">${a.ajudante}</div></div>`:''} ${a.placaVeiculo?`<div class="atendField"><div class="atendLbl">Veículo</div><div class="atendVal infoMono">${a.placaVeiculo}</div></div>`:''} ${divida?`<div class="atendField"><div class="atendLbl">Dívida</div><div class="atendVal" style="color:var(--red)">${divida}</div></div>`:''} ${a.causa?`<div class="atendFieldFull"><div class="atendLbl">Causa / Resultado</div><div class="atendVal">${a.causa}</div></div>`:''}</div>${a.observacoes?`<div class="atendObs"><div class="atendObsLbl">📝 Observações</div>${a.observacoes}</div>`:''}${gpsMedHTML}</div></div>`;}
function toggleAtend(i){const body=document.getElementById('abody-'+i),chev=document.getElementById('chev-'+i);if(!body)return;const open=body.classList.toggle('open');chev.classList.toggle('open',open);}
function navToGps(lat,lng){window.open(`https://www.google.com/maps?q=${lat},${lng}`,'_blank');}
function haversine(la1,lo1,la2,lo2){const R=6371000,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180,a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function fmtDist(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km';}
</script>
